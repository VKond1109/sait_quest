[OnlineSubsystem]
DefaultPlatformService=Steam

[OnlineSubsystemSteam]
bEnabled=true
SteamDevAppId=480
GameServerQueryPort=27015
bInitServerOnClient=true
bUseVACAntiCheat=false

[/Script/OnlineSubsystemSteam.SteamNetDriver]
NetConnectionClassName="/Script/OnlineSubsystemSteam.SteamNetConnection"

[/Script/Engine.GameEngine]
!NetDriverDefinitions=ClearArray
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="/Script/OnlineSubsystemSteam.SteamNetDriver",DriverClassNameFallback="/Script/OnlineSubsystemUtils.IpNetDriver")
+NetDriverDefinitions=(DefName="BeaconNetDriver",DriverClassName="/Script/OnlineSubsystemSteam.SteamNetDriver",DriverClassNameFallback="/Script/OnlineSubsystemUtils.IpNetDriver")
+NetDriverDefinitions=(DefName="DemoNetDriver",DriverClassName="/Script/Engine.DemoNetDriver",DriverClassNameFallback="/Script/Engine.DemoNetDriver")

[/Script/Engine.NetworkSettings]
NetworkEmulationProfiles=(ProfileName="Average",Tooltip="Simulates average connection")
NetworkEmulationProfiles=(ProfileName="Bad",Tooltip="Simulates bad connection")

[/Script/SocketSubsystemEpic.EpicNetDriver]
MaxClientRate=15000
MaxInternetClientRate=10000
RelevantTimeout=5.0f
SpawnPrioritySeconds=1.0f
ServerTravelPause=4.0f
NetServerMaxTickRate=30
NetConnectionTimeout=30.0f
InitialConnectTimeout=30.0f
KeepAliveTime=0.2f
MaxPortCountToTry=100

[/Script/IpServer.IpNetDriver]
MaxClientRate=15000
MaxInternetClientRate=10000
RelevantTimeout=5.0f
SpawnPrioritySeconds=1.0f
ServerTravelPause=4.0f
NetServerMaxTickRate=30
NetConnectionTimeout=30.0f
InitialConnectTimeout=30.0f
KeepAliveTime=0.2f
MaxPortCountToTry=100

[/Script/Engine.Player]
ConfiguredInternetSpeed=10000
ConfiguredLanSpeed=20000
